<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --main-gold: #d4af37; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; }
        
        .screen { 
            position: absolute; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; display: none;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .active { display: flex !important; opacity: 1; z-index: 10; }

        /* 角色選擇：四個隱形點擊區 */
        .char-grid { display: grid; grid-template-columns: repeat(4, 1fr); width: 100%; height: 100%; }
        .char-hitbox { cursor: pointer; background: transparent; }

        /* 介紹頁：底部隱形點擊區 */
        .intro-trigger { position: absolute; bottom: 0; width: 100%; height: 30%; cursor: pointer; }

        /* 對話 UI：長方形、貼底、強磨砂 */
        #game-screen { justify-content: flex-end; align-items: flex-end; }
        #dialogue-ui { 
            width: 100%; 
            height: 240px; 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(35px) saturate(160%);
            -webkit-backdrop-filter: blur(35px) saturate(160%);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            padding: 35px 8%; 
            box-sizing: border-box;
            position: absolute; bottom: 0; left: 0; z-index: 20;
            cursor: pointer;
        }
        #char-name { 
            background: var(--main-gold); color: white; 
            padding: 4px 20px; font-size: 1.15em; font-weight: bold;
            display: inline-block; margin-bottom: 12px; letter-spacing: 2px;
        }
        #text-content { 
            font-size: 1.5em; line-height: 1.7; color: #111; 
            letter-spacing: 1.3px; font-weight: 700; /* 加粗解決清晰度問題 */
        }

        /* 選項 UI */
        .opt-container { width: 100%; position: absolute; bottom: 260px; left: 0; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 100; }
        .opt-btn { width: 380px; padding: 18px; background: rgba(255,255,255,0.95); border: 2px solid var(--main-gold); cursor: pointer; font-size: 1.2em; font-weight: bold; color: var(--main-gold); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .opt-btn:hover { background: var(--main-gold); color: white; }

        /* 下雨特效 */
        #rain-overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5; display: none; }
        .rain { width: 100%; height: 100%; background-image: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%); background-size: 2px 400px; animation: rain-fall 0.6s linear infinite; }
        @keyframes rain-fall { 0% { background-position: 0px -400px; } 100% { background-position: 20px 800px; } }
    </style>
</head>
<body>

    <div id="rain-overlay"><div class="rain"></div></div>

    <div id="start-screen" class="screen active" style="background-image: url('0.jpg');" onclick="switchScreen('selector-screen')"></div>

    <div id="selector-screen" class="screen" style="background-image: url('selector_bg.jpg');">
        <div class="char-grid">
            <div class="char-hitbox" onclick="showIntro('zhou')"></div>
            <div class="char-hitbox"></div>
            <div class="char-hitbox"></div>
            <div class="char-hitbox"></div>
        </div>
    </div>

    <div id="zhou-intro-screen" class="screen" style="background-image: url('zhou_intro.jpg');">
        <div class="intro-trigger" onclick="startStory()"></div>
    </div>

    <div id="game-screen" class="screen">
        <div id="opt-box" class="opt-container"></div>
        <div id="dialogue-ui" onclick="handleNext()">
            <div id="char-name"></div>
            <div id="text-content"></div>
        </div>
    </div>

<script>
    const story = [
        // --- P1-P17: 雨夜初遇 ---
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，雨聲像沒完沒了的碎玻璃，一片片砸在城市的雨夜裡。", bg: "rain_night.jpg", rain: true },
        { name: "旁白", text: "巷口昏黃的路燈下，你看見一名身著校服的學生被兩個男生困在牆邊。他那一頭張揚的金髮被雨打濕，唇角滲著紅。", bg: "alley_night.jpg", rain: true },
        { name: "Y/N", text: "「住手，我已經報警了！」", bg: "alley_night.jpg", rain: true },
        { name: "周渺", text: "「......多管閒事。」他低著頭，聲音冷得像冰。", bg: "alley_night.jpg", rain: true },
        { name: "旁白", text: "你不理會他不耐煩的語氣，蹲下與之平視。「嘴角破的蠻深的，你可能需要去醫院。」", bg: "alley_night.jpg", rain: true },
        { name: "周渺", text: "「別碰我。」他縮了一下，眼神充滿防備。", bg: "alley_night.jpg", rain: true },
        { name: "周渺", text: "「奇怪的人......」他看著妳遠去的背影喃喃自語。", bg: "alley_night.jpg", rain: true },

        // --- P18-P29: 操場夕陽 ---
        { name: "旁白", text: "夕陽把操場暈染成柔和的橘金色。放學後，你到高中找周渺。他偶爾偷看你，耳尖在夕光中微微發紅。", bg: "school_track.jpg", rain: false },
        { name: "Y/N", text: "「看看，像不像第一次見面的你，張牙舞爪的，但明明很可愛的嘛。」", bg: "school_track.jpg" },
        { name: "周渺", text: "「怎麼又提起來、別逗我了......姐姐。」他侷促地低頭。", bg: "school_track.jpg" },
        { name: "Y/N", text: "「喊聲姐姐來聽聽囉，我考慮一下要不要放過你。」", bg: "school_track.jpg" },
        { name: "周渺", text: "「姐、姐姐......」他聲音細如蚊蚋。", bg: "school_track.jpg" },

        // --- P30-P35: 夜景街道 (分手轉折) ---
        { name: "旁白", text: "夜幕降臨，街道兩旁的霓虹燈開始閃爍。氣氛突然變得凝重，妳停下腳步。", bg: "street_night.jpg", rain: false },
        { name: "Y/N", text: "「我們還是分開吧，我不想把你綁在我身邊，耽誤你的未來。」", bg: "street_night.jpg" },
        { name: "周渺", text: "「姐姐......你不要我了嗎？」他慌張地抓住你的衣角，眼神充滿祈求。", bg: "street_night.jpg" },
        { name: "周渺", text: "「妳總是這樣...輕易地決定我的未來。那妳有沒有想過，我的未來裡如果沒有妳，還算什麼未來？」", bg: "street_night.jpg" },
        { name: "周渺", text: "「我努力考上理想的學校，努力變得成熟，都是為了能站在妳身邊啊！」", bg: "street_night.jpg" },
        { name: "周渺", text: "「姐姐，別再推開我了，好嗎？」他聲音微顫，帶著哀求。", bg: "street_night.jpg" },
        { 
            name: "抉擇", 
            text: "在冷清的街道燈火下，妳的回答是？", 
            options: [
                { text: "回抱住他", reaction: "他激動地緊緊擁抱住妳。", nextIndex: 19 },
                { text: "狠心離開", reaction: "妳沒有回頭，消失在霓虹燈中。", nextIndex: 20 }
            ]
        },
        { name: "周渺", text: "「只要妳不走...要我做什麼都可以。」", bg: "street_night.jpg", end: true },
        { name: "旁白", text: "你們的故事，在此刻翻開了新的一頁。", bg: "street_night.jpg", end: true }
    ];

    let step = 0; let isTyping = false; let typingTimer; let currentLine = null;

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function showIntro(char) { if(char==='zhou') switchScreen('zhou-intro-screen'); }
    function startStory() { step = 0; switchScreen('game-screen'); playNext(); }

    function playNext() {
        if (step >= story.length) return;
        currentLine = story[step];
        document.getElementById('rain-overlay').style.display = currentLine.rain ? 'block' : 'none';
        document.getElementById('char-name').innerText = currentLine.name;
        document.getElementById('opt-box').innerHTML = "";
        if (currentLine.bg) document.getElementById('game-screen').style.backgroundImage = `url('${currentLine.bg}')`;

        if (currentLine.options) {
            showOptions(currentLine);
        } else {
            typeText(currentLine.text);
            step++;
        }
    }

    function typeText(text) {
        isTyping = true; let i = 0; const el = document.getElementById('text-content');
        el.innerText = ""; clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) { el.innerText += text[i++]; }
            else { isTyping = false; clearInterval(typingTimer); }
        }, 40);
    }

    function showOptions(line) {
        document.getElementById('text-content').innerText = line.text;
        const box = document.getElementById('opt-box');
        line.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = opt.text;
            b.onclick = (e) => { e.stopPropagation(); alert(opt.reaction); step = opt.nextIndex; playNext(); };
            box.appendChild(b);
        });
    }

    function handleNext() {
        if (currentLine && currentLine.options) return;
        if (isTyping) {
            clearInterval(typingTimer);
            document.getElementById('text-content').innerText = currentLine.text;
            isTyping = false;
        } else {
            if (currentLine && currentLine.end) { location.reload(); }
            else playNext();
        }
    }
</script>
</body>
</html>
