<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練愛 Practice of Love</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; }
        #game-container { width: 100vw; height: 100vh; background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; transition: background 1s ease; }
        
        /* 角色選擇面板 */
        #selector-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .char-btn { width: 80%; max-width: 400px; padding: 15px; margin: 10px; border: 2px solid white; color: white; text-align: center; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .char-btn:hover { background: white; color: black; }

        /* 對話框樣式 */
        #ui-layer { width: 90%; max-width: 800px; background: rgba(30, 30, 30, 0.9); border: 2px solid #fff; border-radius: 15px; padding: 25px; margin-bottom: 30px; cursor: pointer; z-index: 10; }
        #name-tag { font-size: 1.3em; color: #ffadd2; font-weight: bold; margin-bottom: 10px; }
        #text-box { font-size: 1.1em; color: white; line-height: 1.6; min-height: 80px; }
        .click-hint { text-align: right; color: #888; font-size: 0.8em; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container" style="background-image: url('rain_night.jpg');">
    <div id="selector-layer">
        <h2 style="color:white;">請選擇角色</h2>
        <div class="char-btn" onclick="startRoute('zhou')">周渺 (18歲 高中生)</div>
        <div class="char-btn" onclick="startRoute('lin')">林曜晨 (19歲 系排成員)</div>
        <div class="char-btn" onclick="startRoute('mu')">穆修 (22歲 同系學長)</div>
        <div class="char-btn" onclick="startRoute('jiang')">江逸 (25歲 咖啡廳店長)</div>
    </div>

    <div id="ui-layer" onclick="handleNext()">
        <div id="name-tag">旁白</div>
        <div id="text-box">晚間，城市淅瀝瀝地下著雨... 雨聲像沒完沒了的碎玻璃。</div>
        <div class="click-hint">點擊繼續...</div>
    </div>
</div>

<script>
    let currentRoute = 'prologue';
    let step = 0;

    // 劇本數據 [引用自 PDF 內容]
    const scripts = {
        prologue: [
            { name: "旁白", text: "你走在那條熟悉的路上，準備回家。", bg: "rain_night.jpg" },
            { name: "??", text: "奇怪的人......", bg: "rain_night.jpg" },
            { name: "系統", text: "請選擇你想深入瞭解的「練愛」對象。", showSelector: true }
        ],
        zhou: [
            { name: "旁白", text: "放學後，你到周渺就讀的高中找他。", bg: "school_track.jpg" },
            { name: "周渺", text: "姐、姐姐......", bg: "school_track.jpg" },
            { name: "周渺", text: "姐姐......你不要我了嗎？", bg: "school_track.jpg" }
        ],
        lin: [
            { name: "林曜晨", text: "（聳肩）同路也算一起吧。", bg: "rain_walk.jpg" },
            { name: "林曜晨", text: "（把傘稍微往你那邊斜）我知道就好......", bg: "rain_walk.jpg" },
            { name: "林曜晨", text: "躲雨這種事，我們不是一直都一起嗎？", bg: "rain_walk.jpg" }
        ],
        mu: [
            { name: "穆修", text: "怎麼了嗎？有什麼問題嗎？", bg: "library.jpg" },
            { name: "旁白", text: "你挪開了目光，臉蛋微微泛紅快步走掉...", bg: "library.jpg" },
            { name: "穆修", text: "（嘴角微微上揚）看這作者的人很少呢。", bg: "library.jpg" }
        ],
        jiang: [
            { name: "江逸", text: "「歡迎光臨....稍等一下....」", bg: "cafe.jpg" },
            { name: "你", text: "那個....今天的飲品有什麼特別的推薦？", bg: "cafe.jpg" },
            { name: "江逸", text: "嗯，你可以考慮卡布奇諾...", bg: "cafe.jpg" },
            { name: "你", text: "原來你一直都記得我常喝的飲料嗎？", bg: "cafe.jpg" }
        ]
    };

    function handleNext() {
        const route = scripts[currentRoute];
        if (step < route.length) {
            const data = route[step];
            if (data.showSelector) {
                document.getElementById('selector-layer').style.display = 'flex';
            } else {
                updateUI(data);
                step++;
            }
        }
    }

    function updateUI(data) {
        document.getElementById('name-tag').innerText = data.name;
        document.getElementById('text-box').innerText = data.text;
        if (data.bg) {
            document.getElementById('game-container').style.backgroundImage = `url('${data.bg}')`;
        }
    }

    function startRoute(routeKey) {
        currentRoute = routeKey;
        step = 0;
        document.getElementById('selector-layer').style.display = 'none';
        handleNext();
    }
</script>
</body>
</html>
