<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --pink: #ffadd2; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; color: white; }
        
        .screen { 
            position: absolute; width: 100vw; height: 100vh; 
            display: none; /* 預設隱藏 */
            background-size: cover; background-position: center; background-repeat: no-repeat;
            justify-content: center; align-items: center;
        }

        /* 強制顯示當前畫面 */
        .active { display: flex !important; }

        #start-screen { background-image: url('0.jpg'); cursor: pointer; flex-direction: column; justify-content: flex-end; }
        .hint-text { margin-bottom: 80px; font-size: 1.5em; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px #000; pointer-events: none; }

        #selector-screen { background-image: url('selector_bg.jpg'); flex-direction: column; justify-content: flex-end; }
        .menu-bar { width: 100%; background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; gap: 40px; padding: 25px 0; border-top: 2px solid #d4af37; }
        .menu-item { font-size: 1.4em; cursor: pointer; font-weight: bold; color: #fff; transition: 0.2s; }
        .menu-item:hover { color: var(--pink); transform: scale(1.1); }

        #game-screen { justify-content: flex-end; flex-direction: column; }
        #dialogue-ui { 
            width: 85%; max-width: 900px; background: rgba(20, 10, 10, 0.9); 
            border: 2px solid #d4af37; border-radius: 15px; padding: 30px; 
            margin-bottom: 50px; cursor: pointer; position: relative;
        }
        #char-name { 
            position: absolute; top: -20px; left: 30px; 
            background: #f5f5dc; color: #4a3728; 
            padding: 5px 25px; font-weight: bold; border-radius: 10px; border: 1px solid #d4af37;
        }
        #text-content { font-size: 1.3em; line-height: 1.6; min-height: 80px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active" onclick="goToSelector()">
        <div class="hint-text">CLICK TO START</div>
    </div>

    <div id="selector-screen" class="screen">
        <div class="menu-bar">
            <div class="menu-item" onclick="playZhouMiao(event)">START</div>
            <div class="menu-item" style="opacity: 0.3;">LOAD</div>
            <div class="menu-item" style="opacity: 0.3;">SETTINGS</div>
        </div>
    </div>

    <div id="intro-screen" class="screen" style="background-image: url('zhou_intro.jpg');"></div>

    <div id="game-screen" class="screen">
        <div id="dialogue-ui" onclick="handleNextClick(event)">
            <div id="char-name">系統</div>
            <div id="text-content"></div>
        </div>
    </div>

<script>
    const zhouScript = [
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，雨聲像沒完沒了的碎玻璃。", bg: "rain_night.jpg" },
        { name: "周渺", text: "姐姐......你不要我了嗎？", bg: "school_track.jpg" }
    ];

    let step = 0;
    let isTyping = false;
    let typingTimer;
    let currentFullText = "";

    // 專屬封面跳轉函式
    function goToSelector() {
        console.log("進入角色選擇");
        switchScreen('selector-screen');
    }

    // 核心切換函式
    function switchScreen(id) {
        // 隱藏所有畫面
        const screens = document.querySelectorAll('.screen');
        screens.forEach(s => s.classList.remove('active'));
        
        // 顯示目標畫面
        const target = document.getElementById(id);
        if (target) {
            target.classList.add('active');
        } else {
            console.error("找不到 ID 為 " + id + " 的畫面");
        }
    }

    function playZhouMiao(event) {
        event.stopPropagation(); // 防止點擊事件冒泡
        switchScreen('intro-screen');
        setTimeout(() => {
            switchScreen('game-screen');
            setTimeout(startDialogue, 500);
        }, 1500);
    }

    function startDialogue() {
        if (step < zhouScript.length) {
            const line = zhouScript[step];
            document.querySelector('#char-name').innerText = line.name;
            document.getElementById('game-screen').style.backgroundImage = `url('${line.bg}')`;
            currentFullText = line.text;
            runTypeWriter(line.text);
            step++;
        } else {
            alert("本章結束");
            location.reload();
        }
    }

    function runTypeWriter(text) {
        isTyping = true;
        const textEl = document.getElementById('text-content');
        textEl.innerText = "";
        let i = 0;
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) {
                textEl.innerText += text.charAt(i);
                i++;
            } else {
                finishTyping();
            }
        }, 40);
    }

    function finishTyping() {
        document.getElementById('text-content').innerText = currentFullText;
        isTyping = false;
        clearInterval(typingTimer);
    }

    function handleNextClick(event) {
        event.stopPropagation();
        if (isTyping) finishTyping();
        else startDialogue();
    }
</script>
</body>
</html>
