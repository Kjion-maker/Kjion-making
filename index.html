<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --pink: #ffadd2; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; color: white; }
        
        .screen { 
            position: absolute; width: 100vw; height: 100vh; 
            display: none; /* 預設隱藏 */
            background-size: cover; background-position: center; 
            background-repeat: no-repeat; background-color: #000; 
        }
        /* 被啟動的畫面直接顯示 */
        .active { display: flex !important; }

        #start-screen { 
            background-image: url('0.jpg'); 
            flex-direction: column; justify-content: flex-end; align-items: center; cursor: pointer;
        }
        
        .hint-text { margin-bottom: 80px; font-size: 1.2em; letter-spacing: 5px; color: rgba(255, 255, 255, 0.7); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        #selector-screen { background-image: url('selector_bg.jpg'); flex-direction: column; justify-content: flex-end; align-items: center; }
        .menu-bar { width: 100%; background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; gap: 40px; padding: 25px 0; border-top: 1.5px solid #d4af37; }
        .menu-item { font-size: 1.4em; letter-spacing: 5px; cursor: pointer; font-weight: bold; }

        #game-screen { justify-content: flex-end; flex-direction: column; align-items: center; }
        #dialogue-ui { 
            width: 85%; max-width: 900px; background: rgba(25, 15, 15, 0.9); 
            border: 1.5px solid #d4af37; border-radius: 15px; padding: 30px; 
            margin-bottom: 50px; cursor: pointer; position: relative;
        }
        #char-name { 
            position: absolute; top: -22px; left: 30px; 
            background: rgba(245, 245, 220, 0.95); color: #4a3728; 
            padding: 6px 25px; font-weight: bold; border-radius: 10px; border: 1px solid #d4af37;
        }
        #text-content { font-size: 1.3em; line-height: 1.8; min-height: 80px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active" onclick="switchScreen('selector-screen')">
        <div class="hint-text">- CLICK TO START -</div>
    </div>

    <div id="selector-screen" class="screen">
        <div class="menu-bar">
            <div class="menu-item" onclick="playZhouMiao()">START</div>
            <div class="menu-item" style="opacity: 0.3;">LOAD</div>
            <div class="menu-item" style="opacity: 0.3;">SETTINGS</div>
        </div>
    </div>

    <div id="intro-screen" class="screen" style="background-image: url('zhou_intro.jpg');"></div>

    <div id="game-screen" class="screen">
        <div id="dialogue-ui" onclick="handleNextClick()">
            <div id="char-name">系統</div>
            <div id="text-content"></div>
        </div>
    </div>

<script>
    const zhouScript = [
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，雨聲像沒完沒了的碎玻璃。", bg: "rain_night.jpg" },
        { name: "??", text: "奇怪的人......", bg: "rain_night.jpg" },
        { name: "旁白", text: "放學後，你到周渺就讀的高中找他。", bg: "school_track.jpg" },
        { name: "周渺", text: "姐姐......你不要我了嗎？", bg: "school_track.jpg" }
    ];

    let step = 0;
    let isTyping = false;
    let typingTimer;
    let currentFullText = "";

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const next = document.getElementById(id);
        if (next) next.classList.add('active');
    }

    function playZhouMiao() {
        switchScreen('intro-screen');
        setTimeout(() => {
            switchScreen('game-screen');
            setTimeout(startDialogue, 500);
        }, 1500);
    }

    function startDialogue() {
        if (step < zhouScript.length) {
            const line = zhouScript[step];
            document.querySelector('#char-name').innerText = line.name;
            document.getElementById('game-screen').style.backgroundImage = `url('${line.bg}')`;
            currentFullText = line.text;
            runTypeWriter(line.text);
            step++;
        } else {
            alert("本章結束");
            location.reload();
        }
    }

    function runTypeWriter(text) {
        isTyping = true;
        const textEl = document.getElementById('text-content');
        textEl.innerText = "";
        let i = 0;
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) {
                textEl.innerText += text.charAt(i);
                i++;
            } else {
                finishTyping();
            }
        }, 40);
    }

    function finishTyping() {
        document.getElementById('text-content').innerText = currentFullText;
        isTyping = false;
        clearInterval(typingTimer);
    }

    function handleNextClick() {
        if (isTyping) finishTyping();
        else startDialogue();
    }
</script>
</body>
</html>
