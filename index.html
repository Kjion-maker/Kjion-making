<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --main-gold: #d4af37; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; }
        
        .screen { 
            position: absolute; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; display: none;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .active { display: flex !important; opacity: 1; z-index: 10; }

        /* --- 1. 角色選擇頁：隱形點擊區 --- */
        .char-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); 
            width: 100%; height: 100%;
        }
        .char-hitbox { 
            cursor: pointer; background: transparent; transition: background 0.3s;
        }
        /* 測試時可以把透明度改為 0.1 看看位置對不對 */
        .char-hitbox:hover { background: rgba(255,255,255,0.05); }

        /* --- 2. 角色介紹頁：純淨模式 --- */
        .intro-trigger {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 100px; cursor: pointer; background: transparent;
        }

        /* --- 3. 對話 UI：長方形貼底磨砂 --- */
        #game-screen { justify-content: flex-end; align-items: flex-end; }
        #dialogue-ui { 
            width: 100%; 
            height: 25%; /* 佔螢幕下方的 1/4 */
            background: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding: 30px 8%; 
            box-sizing: border-box;
            position: absolute; bottom: 0; left: 0; z-index: 20;
            cursor: pointer;
        }
        #char-name { 
            background: var(--main-gold); color: white; 
            padding: 4px 20px; font-size: 1.1em; font-weight: bold;
            display: inline-block; margin-bottom: 15px; letter-spacing: 2px;
        }
        #text-content { 
            font-size: 1.5em; line-height: 1.6; color: #111; 
            letter-spacing: 1.2px; font-weight: bold;
        }

        /* 選項 UI */
        .opt-container { 
            width: 100%; position: absolute; bottom: 26%; left: 0; 
            display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 100; 
        }
        .opt-btn { 
            width: 350px; padding: 15px; background: rgba(255,255,255,0.9); 
            border: 2px solid var(--main-gold); cursor: pointer; 
            font-size: 1.1em; font-weight: bold; color: var(--main-gold); 
        }

        /* 特效 */
        #rain-overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5; display: none; }
        .rain { width: 100%; height: 100%; background-image: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%); background-size: 2px 400px; animation: rain-fall 0.6s linear infinite; }
        @keyframes rain-fall { 0% { background-position: 0px -400px; } 100% { background-position: 20px 800px; } }
    </style>
</head>
