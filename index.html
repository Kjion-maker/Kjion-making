<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --pink: #ffadd2; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; color: white; }
        
        .screen { 
            position: absolute; 
            width: 100vw; 
            height: 100vh; 
            display: none; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            background-color: #000; /* 沒圖時保底黑色 */
        }
        .active { display: flex; opacity: 1; }

        /* 1. 封面 */
        #start-screen { 
            background-image: url('0.jpg'); 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: center;
        }
        
        .enter-btn { 
            margin-bottom: 80px;
            padding: 15px 60px; 
            border: 2px solid var(--pink); 
            background: rgba(0,0,0,0.6); 
            color: var(--pink); 
            font-size: 1.5em;
            cursor: pointer; 
            letter-spacing: 10px;
            transition: 0.3s;
        }
        .enter-btn:hover { background: var(--pink); color: black; box-shadow: 0 0 20px var(--pink); }

        /* 2. 角色選擇 (清單圖) */
        #selector-screen { 
            background-image: url('selector_bg.jpg'); 
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .menu-bar { width: 100%; background: rgba(0, 0, 0, 0.7); display: flex; justify-content: center; gap: 30px; padding: 20px 0; border-top: 1px solid var(--pink); }
        .menu-item { font-size: 1.3em; letter-spacing: 5px; cursor: pointer; font-weight: bold; }
        .menu-item:hover { color: var(--pink); }

        /* 3. 過場圖 */
        #intro-screen { background-image: url('zhou_intro.jpg'); }

        /* 4. 遊戲畫面 */
        #game-screen { justify-content: flex-end; flex-direction: column; align-items: center; }
        #dialogue-ui { width: 80%; max-width: 800px; background: rgba(10, 10, 10, 0.9); border: 2px solid var(--pink); border-radius: 10px; padding: 25px; margin-bottom: 40px; cursor: pointer; position: relative; }
        #char-name { position: absolute; top: -18px; left: 20px; background: var(--pink); color: #000; padding: 4px 20px; font-weight: bold; border-radius: 4px; }
        #text-content { font-size: 1.2em; line-height: 1.6; min-height: 60px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <button class="enter-btn" onclick="switchScreen('selector-screen')">ENTER</button>
    </div>

    <div id="selector-screen" class="screen">
        <div class="menu-bar">
            <div class="menu-item" onclick="playZhouMiao()">START</div>
            <div class="menu-item" style="opacity: 0.3;">LOAD</div>
            <div class="menu-item" style="opacity: 0.3;">SETTINGS</div>
        </div>
    </div>

    <div id="intro-screen" class="screen">
        </div>

    <div id="game-screen" class="screen">
        <div id="dialogue-ui" onclick="handleNextClick()">
            <div id="char-name">系統</div>
            <div id="text-content"></div>
        </div>
    </div>

<script>
    const zhouScript = [
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，雨聲像沒完沒了的碎玻璃。", bg: "rain_night.jpg" },
        { name: "??", text: "奇怪的人......", bg: "rain_night.jpg" },
        { name: "旁白", text: "放學後，你到周渺就讀的高中找他。", bg: "school_track.jpg" },
        { name: "周渺", text: "姐姐......你不要我了嗎？", bg: "school_track.jpg" }
    ];

    let step = 0;
    let isTyping = false;
    let typingTimer;

    function playZhouMiao() {
        switchScreen('intro-screen');
        setTimeout(() => {
            switchScreen('game-screen');
            startDialogue();
        }, 1500);
    }

    function startDialogue() {
        if (step < zhouScript.length) {
            const line = zhouScript[step];
            document.getElementById('char-name').innerText = line.name;
            document.getElementById('game-screen').style.backgroundImage = `url('${line.bg}')`;
            runTypeWriter(line.text);
            step++;
        } else {
            alert("本章結束");
            location.reload();
        }
    }

    function runTypeWriter(text) {
        isTyping = true;
        const textEl = document.getElementById('text-content');
        textEl.innerText = "";
        let i = 0;
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) {
                textEl.innerText += text.charAt(i);
                i++;
            } else {
                isTyping = false;
                clearInterval(typingTimer);
            }
        }, 50);
    }

    function handleNextClick() {
        if (!isTyping) startDialogue();
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).style.display = 'flex';
        setTimeout(() => document.getElementById(id).classList.add('active'), 10);
    }
</script>
</body>
</html>
