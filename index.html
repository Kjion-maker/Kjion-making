<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --pink: #ffadd2; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; color: white; }
        
        /* 畫面轉場基礎設定 */
        .screen { 
            position: absolute; 
            width: 100vw; 
            height: 100vh; 
            display: none; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            background-color: #000;
            opacity: 0; /* 預設透明，用來做淡入淡出 */
            transition: opacity 1.2s ease; /* 增加轉場時間，更有氣氛 */
        }
        .active { display: flex; opacity: 1; }

        /* 1. 開場封面 - 移除按鈕，改為全畫面手勢 */
        #start-screen { 
            background-image: url('0.jpg'); 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: center; 
            cursor: pointer; /* 鼠標移上去會變手指，提示可以點擊 */
        }
        
        /* 提示文字：淡淡的閃爍，不擋住男主角們 */
        .hint-text {
            margin-bottom: 80px;
            font-size: 1.2em;
            letter-spacing: 5px;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        /* 2. 角色選擇 (清單圖) */
        #selector-screen { 
            background-image: url('selector_bg.jpg'); 
            flex-direction: column; 
            justify-content: flex-end; 
            align-items: center; 
        }

        .menu-bar { 
            width: 100%; 
            background: rgba(0, 0, 0, 0.7); 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            padding: 25px 0; 
            border-top: 1.5px solid #d4af37; 
        }
        .menu-item { font-size: 1.4em; letter-spacing: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .menu-item:hover { color: var(--pink); text-shadow: 0 0 10px var(--pink); }

        /* 4. 遊戲劇情畫面 */
        #game-screen { justify-content: flex-end; flex-direction: column; align-items: center; }
        #dialogue-ui { 
            width: 85%; max-width: 900px; 
            background: rgba(25, 15, 15, 0.9); 
            border: 1.5px solid #d4af37; 
            border-radius: 15px; 
            padding: 30px; 
            margin-bottom: 50px; 
            cursor: pointer; 
            position: relative;
        }
        #char-name { 
            position: absolute; top: -22px; left: 30px; 
            background: rgba(245, 245, 220, 0.95); 
            color: #4a3728; padding: 6px 25px; 
            font-weight: bold; border-radius: 10px; 
            border: 1px solid #d4af37;
        }
        #text-content { font-size: 1.3em; line-height: 1.8; min-height: 80px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active" onclick="switchScreen('selector-screen')">
        <div class="hint-text">- CLICK TO START -</div>
    </div>

    <div id="selector-screen" class="screen">
        <div class="menu-bar">
            <div class="menu-item" onclick="playZhouMiao()">START</div>
            <div class="menu-item" style="opacity: 0.3;">LOAD</div>
            <div class="menu-item" style="opacity: 0.3; pointer-events: none;">SETTINGS</div>
        </div>
    </div>

    <div id="intro-screen" class="screen" style="background-image: url('zhou_intro.jpg');"></div>
    <div id="game-screen" class="screen">
        <div id="dialogue-ui" onclick="handleNextClick()">
            <div id="char-name">系統</div>
            <div id="text-content"></div>
        </div>
    </div>

<script>
    // 轉場邏輯：增加淡入淡出效果
    function switchScreen(id) {
        const current = document.querySelector('.screen.active');
        const next = document.getElementById(id);
        
        if (current) {
            current.style.opacity = '0';
            setTimeout(() => {
                current.style.display = 'none';
                current.classList.remove('active');
                
                next.style.display = 'flex';
                // 觸發重繪讓 opacity 動畫生效
                next.offsetHeight; 
                next.classList.add('active');
                next.style.opacity = '1';
            }, 1000); // 等待淡出動畫完成
        }
    }

    // 周渺劇情開始
    function playZhouMiao() {
        switchScreen('intro-screen');
        setTimeout(() => {
            switchScreen('game-screen');
            startDialogue();
        }, 2000);
    }

    const zhouScript = [
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，雨聲像沒完沒了的碎玻璃。", bg: "rain_night.jpg" },
        { name: "周渺", text: "姐姐......你不要我了嗎？", bg: "school_track.jpg" }
    ];

    let step = 0;
    let isTyping = false;

    function startDialogue() {
        if (step < zhouScript.length) {
            const line = zhouScript[step];
            document.querySelector('#char-name').innerText = line.name;
            document.getElementById('game-screen').style.backgroundImage = `url('${line.bg}')`;
            runTypeWriter(line.text);
            step++;
        }
    }

    function runTypeWriter(text) {
        isTyping = true;
        const textEl = document.getElementById('text-content');
        textEl.innerText = "";
        let i = 0;
        let timer = setInterval(() => {
            if (i < text.length) {
                textEl.innerText += text.charAt(i);
                i++;
            } else {
                isTyping = false;
                clearInterval(timer);
            }
        }, 50);
    }

    function handleNextClick() { if (!isTyping) startDialogue(); }
</script>
</body>
</html>
