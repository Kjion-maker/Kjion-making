<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --main-gold: #d4af37; --text-color: #333; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; }
        
        /* 頁面切換 */
        .screen { 
            position: absolute; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; display: none;
            opacity: 0; transition: opacity 1.2s ease;
        }
        .active { display: flex !important; opacity: 1; z-index: 10; }

        /* 特效層 */
        #rain-overlay {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5;
            display: none; background: rgba(0, 0, 0, 0.1);
        }
        .rain {
            width: 100%; height: 100%;
            background-image: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            background-size: 2px 400px;
            animation: rain-fall 0.7s linear infinite;
        }
        @keyframes rain-fall { 0% { background-position: 0px -400px; } 100% { background-position: 30px 800px; } }

        /* 選單與按鈕 */
        .menu-container { background: rgba(0,0,0,0.7); padding: 40px; border-radius: 20px; text-align: center; color: white; }
        .char-btn { padding: 12px 30px; margin: 10px; font-size: 1.1em; cursor: pointer; border-radius: 8px; border: 1px solid var(--main-gold); background: transparent; color: white; transition: 0.3s; }
        .char-btn:hover { background: var(--main-gold); }

        /* 對話 UI */
        #game-screen { justify-content: flex-end; flex-direction: column; align-items: center; }
        #dialogue-ui { 
            width: 82%; max-width: 950px; background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(12px); border-radius: 24px; padding: 45px 50px; margin-bottom: 50px; 
            cursor: pointer; position: relative; z-index: 20; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        #char-name { 
            position: absolute; top: -25px; left: 50px; background: white; color: var(--main-gold); 
            padding: 10px 40px; font-weight: bold; border-radius: 50px; font-size: 1.2em; border: 1px solid #eee;
        }
        #text-content { font-size: 1.4em; line-height: 1.8; min-height: 100px; color: var(--text-color); letter-spacing: 1.2px; }
        .opt-btn { width: 100%; padding: 15px; margin-top: 10px; background: white; border: 1px solid #ddd; border-radius: 12px; cursor: pointer; font-size: 1.1em; }
        .opt-btn:hover { background: var(--main-gold); color: white; }
    </style>
</head>
<body>

    <div id="rain-overlay"><div class="rain"></div></div>

    <div id="start-screen" class="screen active" style="background-image: url('0.jpg');" onclick="switchScreen('selector-screen')">
        <div style="position: absolute; bottom: 80px; width: 100%; text-align: center; color: white; letter-spacing: 5px;">- CLICK TO START -</div>
    </div>

    <div id="selector-screen" class="screen" style="background-image: url('selector_bg.jpg'); justify-content: center; align-items: center;">
        <div class="menu-container">
            <h3>請選擇攻略對象</h3>
            <button class="char-btn" onclick="showIntro('zhou')">周 渺</button>
            <button class="char-btn" style="opacity:0.5; cursor:default;">夏 鏡 (尚未開放)</button><br>
            <button class="char-btn" style="opacity:0.5; cursor:default;">沈 晏 (尚未開放)</button>
            <button class="char-btn" style="opacity:0.5; cursor:default;">江 遠 (尚未開放)</button>
        </div>
    </div>

    <div id="zhou-intro-screen" class="screen" style="background-image: url('zhou_intro.jpg'); justify-content: center; align-items: center;">
        <div class="menu-container" style="max-width: 400px;">
            <h2>周 渺 (Zhou Miao)</h2>
            <p>「別把我當成小孩...我是真的在看著妳。」</p>
            <p style="font-size: 0.9em; text-align: left;">張揚的金髮下藏著柔軟的心。在那個雨夜被妳救起後，妳便成了他唯一的救贖。</p>
            <button class="char-btn" onclick="startStory()">進入章節</button>
            <button class="char-btn" onclick="switchScreen('selector-screen')">返回</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="dialogue-ui" onclick="handleNext()">
            <div id="char-name"></div>
            <div id="text-content"></div>
            <div id="opt-box"></div>
        </div>
    </div>

<script>
    const story = [
        // --- 雨夜巷弄 (P1-P17) ---
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，無情沖刷每一處，雨聲像沒完沒了的碎玻璃，一片片砸在城市的雨夜裡。一如往常，你走在那條熟悉的路上，準備回家。", bg: "rain_night.jpg", rain: true },
        { name: "旁白", text: "倏忽，一聲語氣強烈的咒罵穿透了雨幕，落入耳中，隨即是幾記沉悶的碰撞聲，像拳頭砸在肉上，伴隨微弱幾不可察的悶哼。", bg: "rain_night.jpg", rain: true },
        { name: "旁白", text: "緩緩走上前去，巷口昏黃的路燈下，你看見一名身著校服的學生被兩個男生困在牆邊。他那一頭張揚的金髮被雨打濕，貼在額前，校服白襯衫凌亂、沾著灰，唇角破裂滲著紅，格外醒目。", bg: "alley_night.jpg", rain: true },
        { name: "Y/N", text: "「住手，我已經報警了！」", bg: "alley_night.jpg", rain: true },
        { name: "??", text: "「......多管閒事。」他低著頭，聲音冷得像冰。", bg: "alley_night.jpg", rain: true },
        { name: "旁白", text: "你並沒有回應他帶著不耐煩的排斥，只是蹲下與之平視，檢查他的傷勢。「嘴角破的蠻深的，手臂的傷口也有點大，你可能需要去醫院。」", bg: "alley_night.jpg", rain: true },
        { name: "??", text: "「別碰我。」他縮了一下，眼神充滿防備。", bg: "alley_night.jpg", rain: true },
        { name: "旁白", text: "你簡單包紮後留下備用傘，轉身離去。他在雨中看著妳的背影喃喃自語：「奇怪的人......」", bg: "alley_night.jpg", rain: true },

        // --- 操場夕陽 (P18-P29) ---
        { name: "旁白", text: "夕陽把操場暈染成柔和的橘金色，光線像被刻意放慢，輕輕鋪在跑道與草地上。樹影被拉得細長，隨著晚風微微晃動，空氣瀰漫溫柔和靜謐，讓人不自覺放慢呼吸。", bg: "school_track.jpg", rain: false },
        { name: "旁白", text: "放學後，你到高中找周渺。跑道空曠而安靜，只剩下你們的腳步聲。他偶爾偷看你，又迅速移開視線，耳尖在夕光中微微發紅。", bg: "school_track.jpg" },
        { name: "Y/N", text: "「看看，像不像第一次見面的你，張牙舞爪的，但明明很可愛的嘛。」你逗弄著懷裡的小貓笑著說。", bg: "school_track.jpg" },
        { name: "周渺", text: "「怎麼又提起來、別逗我了......姐姐。」他侷促地低頭，手指攪在一起。", bg: "school_track.jpg" },
        { name: "旁白", text: "見他害羞，你生起了作弄他的心思。「喊聲姐姐來聽聽囉，我考慮一下要不要放過你。」", bg: "school_track.jpg" },
        { name: "周渺", text: "「姐、姐姐......」他聲音細如蚊蚋。", bg: "school_track.jpg" },
        { name: "Y/N", text: "「我們還是分開吧，我不想把你綁在我身邊，耽誤你的未來。」你的聲音在微風中顯得有些飄渺。", bg: "school_track.jpg" },
        { name: "周渺", text: "「姐姐......你不要我了嗎？」他慌張地抓住你的衣角，眼神清澈卻盛滿了絕望與祈求。", bg: "school_track.jpg" },

        // --- 夜景街道 (P30-P35 補全，修復背景遺失問題) ---
        { name: "旁白", text: "夜幕降臨，街道兩旁的霓虹燈開始閃爍，映照在略顯潮濕的路面上。你們走在無人的街道，氣氛沉重得讓人喘不過氣。", bg: "street_night.jpg", rain: false },
        { name: "旁白", text: "周渺停下腳步，轉過身擋在妳面前，路燈將他的影子拉得破碎。他的情緒終於在這一刻徹底爆發。", bg: "street_night.jpg" },
        { name: "周渺", text: "「妳總是這樣...輕易地決定我的未來。那妳有沒有想過，我的未來裡如果沒有妳，還算什麼未來？」", bg: "street_night.jpg" },
        { name: "周渺", text: "「我努力考上理想的學校，努力變得成熟，都是為了能站在妳身邊啊！」", bg: "street_night.jpg" },
        { name: "Y/N", text: "「周渺，你冷靜一點。這只是你人生的一小段路...」", bg: "street_night.jpg" },
        { 
            name: "系統", 
            text: "在冷清的街道燈火下，面對他近乎哀求的告白，妳最後的決定是？", 
            options: [
                { text: "接受告白", reaction: "他激動地將妳擁入懷中。", nextIndex: 22 },
                { text: "轉身離開", reaction: "妳沒回頭，消失在霓虹燈中。", nextIndex: 23 }
            ]
        },
        { name: "周渺", text: "「只要妳不走...要我做什麼都可以。」他聲音微顫。", bg: "street_night.jpg", end: true },
        { name: "旁白", text: "夜風吹過，街景依舊繁華，故事在此刻翻開了新頁。", bg: "street_night.jpg", end: true }
    ];

    let step = 0;
    let isTyping = false;
    let typingTimer;
    let currentLine = null;

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function showIntro(char) {
        if(char === 'zhou') switchScreen('zhou-intro-screen');
    }

    function startStory() {
        step = 0;
        switchScreen('game-screen');
        playNext();
    }

    function playNext() {
        if (step >= story.length) return;
        currentLine = story[step];
        document.getElementById('rain-overlay').style.display = currentLine.rain ? 'block' : 'none';
        document.getElementById('char-name').innerText = currentLine.name;
        document.getElementById('opt-box').innerHTML = "";
        if (currentLine.bg) document.getElementById('game-screen').style.backgroundImage = `url('${currentLine.bg}')`;

        if (currentLine.options) {
            showOptions(currentLine);
        } else {
            typeText(currentLine.text);
            step++;
        }
    }

    function typeText(text) {
        isTyping = true;
        let i = 0;
        const el = document.getElementById('text-content');
        el.innerText = "";
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) { el.innerText += text[i++]; }
            else { isTyping = false; clearInterval(typingTimer); }
        }, 45);
    }

    function showOptions(line) {
        document.getElementById('text-content').innerText = line.text;
        const box = document.getElementById('opt-box');
        line.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = opt.text;
            b.onclick = (e) => { e.stopPropagation(); alert(opt.reaction); step = opt.nextIndex; playNext(); };
            box.appendChild(b);
        });
    }

    function handleNext() {
        if (currentLine && currentLine.options) return;
        if (isTyping) {
            clearInterval(typingTimer);
            document.getElementById('text-content').innerText = currentLine.text;
            isTyping = false;
        } else {
            if (currentLine && currentLine.end) { alert("周渺篇·序章 完"); location.reload(); }
            else playNext();
        }
    }
</script>
</body>
</html>
