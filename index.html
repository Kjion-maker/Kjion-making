<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --pink: #ffadd2; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; color: white; }
        
        /* 核心轉場設定 */
        .screen { 
            position: absolute; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: flex; flex-direction: column;
            
            /* 轉場動畫關鍵：使用 opacity 和 visibility */
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.2s ease, visibility 1.2s;
            z-index: 1;
        }

        /* 啟動狀態：透明度變 1，且可以被點擊 */
        .active { 
            opacity: 1 !important; 
            visibility: visible !important;
            z-index: 10;
        }

        /* 各畫面背景設定 */
        #start-screen { background-image: url('0.jpg'); cursor: pointer; justify-content: flex-end; align-items: center; }
        #selector-screen { background-image: url('selector_bg.jpg'); justify-content: flex-end; align-items: center; }
        #intro-screen { background-image: url('zhou_intro.jpg'); background-color: #000; justify-content: center; align-items: center; }
        #game-screen { justify-content: flex-end; align-items: center; }

        /* UI 元素樣式 */
        .hint-text { margin-bottom: 80px; font-size: 1.5em; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px #000; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .menu-bar { width: 100%; background: rgba(0, 0, 0, 0.8); display: flex; justify-content: center; gap: 40px; padding: 25px 0; border-top: 2px solid #d4af37; }
        .menu-item { font-size: 1.4em; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .menu-item:hover { color: var(--pink); transform: scale(1.1); }

        #dialogue-ui { 
            width: 85%; max-width: 900px; background: rgba(25, 15, 15, 0.95); 
            border: 2px solid #d4af37; border-radius: 15px; padding: 30px; 
            margin-bottom: 50px; cursor: pointer; position: relative;
        }
        #char-name { 
            position: absolute; top: -20px; left: 30px; 
            background: #f5f5dc; color: #4a3728; 
            padding: 5px 25px; font-weight: bold; border-radius: 10px; border: 1px solid #d4af37;
        }
        #text-content { font-size: 1.3em; line-height: 1.8; min-height: 80px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active" onclick="switchScreen('selector-screen')">
        <div class="hint-text">CLICK TO START</div>
    </div>

    <div id="selector-screen" class="screen">
        <div class="menu-bar">
            <div class="menu-item" onclick="playZhouMiao(event)">START</div>
            <div class="menu-item" style="opacity: 0.3;">LOAD</div>
            <div class="menu-item" style="opacity: 0.3;">SETTINGS</div>
        </div>
    </div>

    <div id="intro-screen" class="screen"></div>

    <div id="game-screen" class="screen">
        <div id="dialogue-ui" onclick="handleNextClick(event)">
            <div id="char-name">系統</div>
            <div id="text-content"></div>
        </div>
    </div>

<script>
    const zhouScript = [
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，雨聲像沒完沒了的碎玻璃。", bg: "rain_night.jpg" },
        { name: "周渺", text: "姐姐......你不要我了嗎？", bg: "school_track.jpg" }
    ];

    let step = 0;
    let isTyping = false;
    let typingTimer;
    let currentFullText = "";

    // 質感轉場：淡出當前，淡入下一個
    function switchScreen(id) {
        const current = document.querySelector('.screen.active');
        const next = document.getElementById(id);
        
        if (current) current.classList.remove('active');
        if (next) next.classList.add('active');
    }

    function playZhouMiao(event) {
        if(event) event.stopPropagation();
        switchScreen('intro-screen');
        
        setTimeout(() => {
            switchScreen('game-screen');
            setTimeout(startDialogue, 1000); // 轉場完成後再開始跑字
        }, 2000);
    }

    function startDialogue() {
        if (step < zhouScript.length) {
            const line = zhouScript[step];
            document.querySelector('#char-name').innerText = line.name;
            document.getElementById('game-screen').style.backgroundImage = `url('${line.bg}')`;
            currentFullText = line.text;
            runTypeWriter(line.text);
            step++;
        } else {
            alert("本章結束");
            location.reload();
        }
    }

    function runTypeWriter(text) {
        isTyping = true;
        const textEl = document.getElementById('text-content');
        textEl.innerText = "";
        let i = 0;
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) {
                textEl.innerText += text.charAt(i);
                i++;
            } else {
                finishTyping();
            }
        }, 50);
    }

    function finishTyping() {
        document.getElementById('text-content').innerText = currentFullText;
        isTyping = false;
        clearInterval(typingTimer);
    }

    function handleNextClick(event) {
        if(event) event.stopPropagation();
        if (isTyping) finishTyping();
        else startDialogue();
    }
</script>
</body>
</html>
