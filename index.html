<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>練愛 Practice of Love</title>
    <style>
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 1280px; height: 720px; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.8); overflow: hidden; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease-in-out; }

        /* --- 修正後的封面：完全移除按鈕元件 --- */
        #start-screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            z-index: 200; 
            cursor: pointer; /* 讓滑鼠移上去顯示手指，提示可點擊 */
        }
        #start-screen img { width: 100%; height: 100%; object-fit: cover; }

       // ★ 精確座標選角邏輯
    function checkCharSelect(e) {
        // 取得點擊位置相對於圖片的實際像素座標 (以 1280x720 為基準)
        const rect = e.target.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) / e.target.clientWidth * 1280;
        const mouseY = (e.clientY - rect.top) / e.target.clientHeight * 720;

        // 設定角色感應區 (你可以根據你的 selector_bg.jpg 構圖微調這些數值)
        // 假設角色分佈在 y = 100 到 600 之間
        const charYTop = 100; 
        const charYBottom = 650;

        // 判斷是否在角色高度範圍內
        if (mouseY >= charYTop && mouseY <= charYBottom) {
            // 周渺 (左一區塊：0 ~ 300px)
            if (mouseX >= 20 && mouseX <= 300) {
                startStory('zhou');
            } 
            // 角色二 (320 ~ 600px)
            else if (mouseX >= 320 && mouseX <= 600) {
                alert("此角色路線尚未開放");
            }
            // 角色三 (650 ~ 930px)
            else if (mouseX >= 650 && mouseX <= 930) {
                alert("此角色路線尚未開放");
            }
            // 江逸 (右一區塊：950 ~ 1250px)
            else if (mouseX >= 950 && mouseX <= 1250) {
                startStory('jiang');
            }
            // 如果點在角色之間的縫隙或背景，則不執行任何動作
        }
    }

        /* 對話框 */
        #dialogue-box { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; height: 180px; background-color: rgba(20, 20, 20, 0.85); border: 2px solid #d4af37; border-radius: 10px; box-sizing: border-box; padding: 40px 30px 20px 30px; color: #fff; cursor: pointer; display: none; z-index: 50; }
        #speaker-name { position: absolute; top: -20px; left: 30px; background-color: #d4af37; color: #fff; padding: 5px 20px; font-size: 22px; font-weight: bold; border-radius: 5px; }
        #dialogue-text { font-size: 22px; line-height: 1.6; font-weight: bold;}

        /* 下雨特效：優化為絲滑雨滴 */
        #rain-overlay { 
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5; display: none;
            background-image: linear-gradient(105deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
            background-size: 3px 600px;
            animation: rain-animation 0.4s linear infinite;
        }
        @keyframes rain-animation {
            from { background-position: 0px 0px; }
            to { background-position: 150px 600px; }
        }

        #options-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 20px; width: 60%; display: none; z-index: 60; }
        .option-btn { background-color: rgba(255, 255, 255, 0.95); color: #333; border: 2px solid #d4af37; padding: 15px 20px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: center; }
        .option-btn:hover { background-color: #d4af37; color: #fff; }

        #interact-btn { position: absolute; background-color: rgba(255, 255, 255, 0.9); border: 2px dashed #a67c52; padding: 15px 40px; font-size: 24px; font-weight: bold; display: none; z-index: 70; transform: translate(-50%, -50%); cursor: pointer; border-radius: 10px; }
        #paper-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 80; }
        #paper-content { background-color: #fdf5e6; width: 500px; height: 300px; padding: 40px; border-radius: 5px; font-size: 30px; text-align: center; transform: rotate(-2deg); cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="rain-overlay"></div>

    <div id="start-screen" onclick="goToMenu()">
        <img src="0.jpg" alt="遊戲封面" onerror="this.src='Start.png'">
    </div>

    <div id="intro-menu-screen">
        <img id="char-select-img" src="selector_bg.jpg" alt="選角畫面" onerror="this.src='IntroMenu.png'" onclick="checkCharSelect(event)">
        <button class="sys-btn" onclick="backToStart()">← 返回標題</button>
    </div>

    <img id="bg-image" src="">
    <button id="back-btn" class="sys-btn" onclick="prevLine()" disabled>← 往回</button>
    
    <div id="options-container"></div>
    <div id="interact-btn"></div>
    
    <div id="paper-modal" onclick="closePaper()">
        <div id="paper-content">『可以坐久一點沒關係。』<br><span style="font-size:14px; color:#888; position:absolute; bottom:15px; right:20px;">▼ 點擊關閉</span></div>
    </div>
    
    <div id="dialogue-box">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
    </div>
</div>

<script>
    const zhouScript = [
        { bg: "rain_night.jpg", speaker: "旁白", text: "晚間，城市淅瀝瀝地下著雨，無情沖刷每一處，雨聲像沒完沒了的碎玻璃，一片片砸在城市的雨夜裡。", rain: true },
        { bg: "rain_night.jpg", speaker: "旁白", text: "一如往常，你走在那條熟悉的路上，準備回家。", rain: true },
        { bg: "alley_night.jpg", speaker: "周渺", text: "「......多管閒事。」他低著頭，聲音冷得像冰。", rain: true },
        { bg: "school_track.jpg", speaker: "周渺", text: "「姐、姐姐......」他聲音細如蚊蚋。", rain: false },
        { 
            bg: "street_night.jpg", speaker: "抉擇", text: "妳的回答是？", 
            options: [{ text: "回抱住他", nextLine: 5 }, { text: "狠心離開", nextLine: 7 }]
        },
        { bg: "street_night.jpg", speaker: "旁白", text: "他激動地緊緊擁抱妳。" },
        { bg: "street_night.jpg", speaker: "周渺", text: "「只要妳不走...要我做什麼都可以。」", action: "endGame" },
        { bg: "street_night.jpg", speaker: "旁白", text: "妳沒回頭，消失在霓虹中。", action: "endGame" }
    ];

    const jiangScript = [
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "你好～歡迎光臨，請問今天想喝點什麼？" },
        { bg: "JiangYi/Start Counter.png", speaker: "", text: "", action: "showMenuInteract", hideDialogue: true },
        { bg: "JiangYi/Tray.png", speaker: "女主角", text: "托盤上的咖啡旁，似乎壓著一張折起來的紙條", action: "showPaperInteract" },
        { bg: "JiangYi/Tray.png", speaker: "旁白", text: "露出滿足的微笑。", action: "endGame" }
    ];

    let activeScript = []; 
    let historyStack = []; 
    let currentIndex = 0;
    let isTyping = false;
    let currentFullText = "";
    let typingTimer;

    function goToMenu() {
        document.getElementById("start-screen").style.display = "none";
        document.getElementById("intro-menu-screen").style.display = "block";
    }

    function backToStart() {
        document.getElementById("intro-menu-screen").style.display = "none";
        document.getElementById("start-screen").style.display = "block";
    }

    function startStory(char) {
        activeScript = (char === 'zhou') ? zhouScript : jiangScript;
        document.getElementById("intro-menu-screen").style.display = "none";
        currentIndex = 0;
        historyStack = ["intro"];
        renderLine(0);
    }

    function renderLine(index) {
        const line = activeScript[index];
        document.getElementById("bg-image").src = line.bg;
        document.getElementById("rain-overlay").style.display = line.rain ? "block" : "none";
        
        const nameBox = document.getElementById("speaker-name");
        nameBox.innerText = line.speaker || "";
        nameBox.style.display = line.speaker ? "block" : "none";

        const dialogueBox = document.getElementById("dialogue-box");
        dialogueBox.style.display = line.hideDialogue ? "none" : "block";
        
        // 打字機效果
        startTyping(line.text || "");

        // 處理選項與互動
        document.getElementById("options-container").style.display = "none";
        document.getElementById("interact-btn").style.display = "none";
        
        if (line.options) {
            const optContainer = document.getElementById("options-container");
            optContainer.innerHTML = "";
            line.options.forEach(opt => {
                const btn = document.createElement("div");
                btn.className = "option-btn";
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.nextLine);
                optContainer.appendChild(btn);
            });
            setTimeout(() => optContainer.style.display = "flex", 500);
        }

        if (line.action === "showMenuInteract" || line.action === "showPaperInteract") {
            const btn = document.getElementById("interact-btn");
            btn.style.display = "block";
            btn.innerText = line.action === "showMenuInteract" ? "查看菜單" : "查看紙條";
            btn.style.left = "50%"; btn.style.top = "50%";
            btn.onclick = (line.action === "showPaperInteract") ? openPaper : () => nextLine();
        }

        dialogueBox.onclick = handleBoxClick;
        document.getElementById("back-btn").disabled = (historyStack.length <= 1);
    }

    function startTyping(text) {
        clearInterval(typingTimer);
        isTyping = true;
        currentFullText = text;
        let i = 0;
        const target = document.getElementById("dialogue-text");
        target.innerHTML = "";
        typingTimer = setInterval(() => {
            if (i < text.length) {
                target.innerHTML += text.charAt(i);
                i++;
            } else {
                isTyping = false;
                clearInterval(typingTimer);
            }
        }, 40);
    }

    function handleBoxClick() {
        if (isTyping) {
            clearInterval(typingTimer);
            document.getElementById("dialogue-text").innerHTML = currentFullText;
            isTyping = false;
        } else {
            if (!activeScript[currentIndex].options && !activeScript[currentIndex].action) {
                nextLine();
            } else if (activeScript[currentIndex].action === "endGame") {
                location.reload(); // 結局重啟
            }
        }
    }

    function nextLine() {
        historyStack.push(currentIndex);
        currentIndex++;
        renderLine(currentIndex);
    }

    function selectOption(next) {
        historyStack.push(currentIndex);
        currentIndex = next;
        renderLine(currentIndex);
    }

    function prevLine() {
        if (historyStack.length > 1) {
            historyStack.pop();
            currentIndex = historyStack[historyStack.length - 1];
            if (currentIndex === "intro") backToStart();
            else renderLine(currentIndex);
        }
    }

    function openPaper() { document.getElementById("paper-modal").style.display = "flex"; }
    function closePaper() { document.getElementById("paper-modal").style.display = "none"; nextLine(); }

    function checkCharSelect(e) {
        const x = (e.offsetX / e.target.clientWidth) * 100;
        if (x < 25) startStory('zhou');
        else if (x > 75) startStory('jiang');
        else alert("此角色路線尚未開放");
    }
</script>
</body>
</html>
