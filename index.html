<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --pink: #ffadd2; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; color: white; }
        
        /* 1. 基礎畫面設定 */
        .screen { 
            position: absolute; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            display: flex; flex-direction: column;
            
            /* 預設狀態：完全透明 */
            opacity: 0;
            pointer-events: none; /* 透明時不可點擊，防止誤觸 */
            transition: opacity 1.5s ease-in-out; /* 增加到 1.5 秒，效果更明顯 */
            z-index: 1;
        }

        /* 2. 啟動狀態：漸變顯現 */
        .active { 
            opacity: 1; 
            pointer-events: auto; /* 顯現後恢復點擊功能 */
            z-index: 10;
        }

        /* 3. 介面樣式 (保留你之前的設計) */
        #start-screen { background-image: url('0.jpg'); cursor: pointer; justify-content: flex-end; align-items: center; }
        #selector-screen { background-image: url('selector_bg.jpg'); justify-content: flex-end; align-items: center; }
        #intro-screen { background-image: url('zhou_intro.jpg'); background-color: #000; justify-content: center; align-items: center; }
        
        .hint-text { margin-bottom: 80px; font-size: 1.5em; letter-spacing: 5px; color: #fff; text-shadow: 0 0 15px rgba(0,0,0,1); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .menu-bar { width: 100%; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; gap: 40px; padding: 25px 0; border-top: 2px solid #d4af37; }
        .menu-item { font-size: 1.4em; cursor: pointer; font-weight: bold; transition: 0.3s; color: #fff; }
        .menu-item:hover { color: var(--pink); transform: scale(1.05); }

        #dialogue-ui { 
            width: 85%; max-width: 900px; background: rgba(20, 10, 10, 0.95); 
            border: 2px solid #d4af37; border-radius: 15px; padding: 35px; 
            margin-bottom: 50px; cursor: pointer; position: relative;
        }
        #char-name { 
            position: absolute; top: -22px; left: 35px; 
            background: #fdf5e6; color: #4a3728; 
            padding: 6px 28px; font-weight: bold; border-radius: 10px; border: 1.2px solid #d4af37;
        }
        #text-content { font-size: 1.4em; line-height: 1.8; min-height: 85px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active" onclick="switchScreen('selector-screen')">
        <div class="hint-text">CLICK TO START</div>
    </div>

    <div id="selector-screen" class="screen">
        <div class="menu-bar">
            <div class="menu-item" onclick="playZhouMiao(event)">START</div>
            <div class="menu-item" style="opacity: 0.3;">LOAD</div>
            <div class="menu-item" style="opacity: 0.3;">SETTINGS</div>
        </div>
    </div>

    <div id="intro-screen" class="screen"></div>

    <div id="game-screen" class="screen">
        <div id="dialogue-ui" onclick="handleNextClick(event)">
            <div id="char-name">系統</div>
            <div id="text-content"></div>
        </div>
    </div>

<script>
    const zhouScript = [
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，雨聲像沒完沒了的碎玻璃。", bg: "rain_night.jpg" },
        { name: "周渺", text: "姐姐......你不要我了嗎？", bg: "school_track.jpg" }
    ];

    let step = 0;
    let isTyping = false;
    let typingTimer;
    let currentFullText = "";

    // 核心轉場函式：這次增加了延遲觸發，確保動畫一定會跑
    function switchScreen(id) {
        const current = document.querySelector('.screen.active');
        const next = document.getElementById(id);
        
        if (current) {
            current.classList.remove('active'); // 開始淡出
        }
        
        if (next) {
            // 給瀏覽器 50 毫秒的喘息時間，確保它知道要執行淡入動畫
            setTimeout(() => {
                next.classList.add('active');
            }, 50);
        }
    }

    function playZhouMiao(event) {
        if(event) event.stopPropagation();
        switchScreen('intro-screen');
        
        // 過場圖停留久一點點
        setTimeout(() => {
            switchScreen('game-screen');
            setTimeout(startDialogue, 1500); // 等遊戲畫面完全顯現後再開始跑字
        }, 2500);
    }

    function startDialogue() {
        if (step < zhouScript.length) {
            const line = zhouScript[step];
            document.querySelector('#char-name').innerText = line.name;
            document.getElementById('game-screen').style.backgroundImage = `url('${line.bg}')`;
            currentFullText = line.text;
            runTypeWriter(line.text);
            step++;
        } else {
            alert("本章結束");
            location.reload();
        }
    }

    function runTypeWriter(text) {
        isTyping = true;
        const textEl = document.getElementById('text-content');
        textEl.innerText = "";
        let i = 0;
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) {
                textEl.innerText += text.charAt(i);
                i++;
            } else {
                finishTyping();
            }
        }, 50);
    }

    function finishTyping() {
        document.getElementById('text-content').innerText = currentFullText;
        isTyping = false;
        clearInterval(typingTimer);
    }

    function handleNextClick(event) {
        if(event) event.stopPropagation();
        if (isTyping) finishTyping();
        else startDialogue();
    }
</script>
</body>
</html>
