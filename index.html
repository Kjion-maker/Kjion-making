<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --pink: #ffadd2; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; color: white; }
        
        /* 核心畫面容器 */
        .screen { 
            position: absolute; 
            width: 100vw; 
            height: 100vh; 
            display: none; 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            transition: opacity 0.8s ease-in-out; 
        }
        .active { display: flex; opacity: 1; }

        /* 1. 開場封面頁面 - 強制鋪滿背景 */
        #start-screen { 
            background-image: url('cover.jpg'); 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }
        
        /* ENTER 按鈕 - 加上發光與呼吸感 */
        .enter-btn { 
            margin-top: 250px; /* 如果擋到標題，可以改這個數字 */
            padding: 15px 80px; 
            border: 2px solid var(--pink); 
            background: rgba(0,0,0,0.6); 
            color: var(--pink); 
            font-size: 1.8em;
            cursor: pointer; 
            letter-spacing: 10px;
            transition: 0.4s;
            box-shadow: 0 0 10px rgba(255,173,210,0.3);
            font-weight: bold;
        }
        .enter-btn:hover { 
            background: var(--pink); 
            color: black; 
            box-shadow: 0 0 30px var(--pink);
            transform: scale(1.1);
        }

        /* 2. 角色選擇介面 (清單圖) */
        #selector-screen { 
            background-image: url('selector_bg.jpg'); 
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .menu-bar { 
            width: 100%; 
            background: rgba(0, 0, 0, 0.75); 
            display: flex; 
            justify-content: center; 
            gap: 50px; 
            padding: 30px 0; 
            border-top: 1px solid var(--pink); 
            z-index: 5; 
        }
        .menu-item { 
            font-size: 1.5em; 
            letter-spacing: 5px; 
            cursor: pointer; 
            color: #fff; 
            transition: 0.3s; 
            font-weight: bold; 
        }
        .menu-item:hover { color: var(--pink); text-shadow: 0 0 15px var(--pink); }

        /* 3. 過場圖 */
        #intro-screen { background-color: #000; justify-content: center; align-items: center; }
        #intro-img { max-height: 90%; max-width: 90%; object-fit: contain; }

        /* 4. 遊戲劇情畫面 */
        #game-screen { justify-content: flex-end; flex-direction: column; align-items: center; }
        #dialogue-ui { 
            width: 85%; 
            max-width: 900px; 
            background: rgba(10, 10, 10, 0.95); 
            border: 2px solid var(--pink); 
            border-radius: 12px; 
            padding: 30px; 
            margin-bottom: 50px; 
            cursor: pointer; 
            z-index: 10; 
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #char-name { 
            position: absolute; 
            top: -22px; 
            left: 25px; 
            background: var(--pink); 
            color: #000; 
            padding: 6px 25px; 
            font-weight: bold; 
            border-radius: 5px;
            font-size: 1.1em;
        }
        #text-content { font-size: 1.3em; line-height: 1.8; min-height: 80px; letter-spacing: 1.5px; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <button class="enter-btn" onclick="switchScreen('selector-screen')">ENTER</button>
    </div>

    <div id="selector-screen" class="screen">
        <div class="menu-bar">
            <div class="menu-item" onclick="playZhouMiao()">START</div>
            <div class="menu-item" style="opacity: 0.3;">LOAD</div>
            <div class="menu-item" style="opacity: 0.3;">SETTINGS</div>
        </div>
    </div>

    <div id="intro-screen" class="screen">
        <img id="intro-img" src="zhou_intro.jpg">
    </div>

    <div id="game-screen" class="screen">
        <div id="dialogue-ui" onclick="handleNextClick()">
            <div id="char-name">系統</div>
            <div id="text-content"></div>
        </div>
    </div>

<script>
    const zhouScript = [
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，雨聲像沒完沒了的碎玻璃。", bg: "rain_night.jpg" },
        { name: "??", text: "奇怪的人......", bg: "rain_night.jpg" },
        { name: "旁白", text: "放學後，你到周渺就讀的高中找他。", bg: "school_track.jpg" },
        { name: "周渺", text: "姐姐......你不要我了嗎？", bg: "school_track.jpg" }
    ];

    let step = 0;
    let isTyping = false;
    let typingTimer;

    function playZhouMiao() {
        switchScreen('intro-screen');
        setTimeout(() => {
            switchScreen('game-screen');
            startDialogue();
        }, 1500);
    }

    function startDialogue() {
        if (step < zhouScript.length) {
            const line = zhouScript[step];
            document.getElementById('char-name').innerText = line.name;
            document.getElementById('game-screen').style.backgroundImage = `url('${line.bg}')`;
            runTypeWriter(line.text);
            step++;
        } else {
            alert("本章結束");
            location.reload();
        }
    }

    function runTypeWriter(text) {
        isTyping = true;
        const textEl = document.getElementById('text-content');
        textEl.innerText = "";
        let i = 0;
        clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) {
                textEl.innerText += text.charAt(i);
                i++;
            } else {
                isTyping = false;
                clearInterval(typingTimer);
            }
        }, 50);
    }

    function handleNextClick() {
        if (!isTyping) startDialogue();
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
