<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>練愛 Practice of Love</title>
    <style>
        :root { --main-gold: #d4af37; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: "Microsoft JhengHei", sans-serif; background: #000; }
        
        /* 移除動畫防止黑屏，確保 active 瞬間出現 */
        .screen { 
            position: absolute; width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; 
            display: none; 
        }
        .active { display: block !important; z-index: 10; }

        /* 角色選擇點擊區域 */
        .char-grid { 
            display: flex; width: 100%; height: 100%; 
            position: absolute; top: 0; left: 0; z-index: 20;
        }
        .char-hitbox { 
            flex: 1; cursor: pointer; background: rgba(255,255,255,0); /* 完全透明但可點擊 */
        }
        .char-hitbox:hover { background: rgba(255,255,255,0.05); }

        /* 介紹頁底部點擊區 */
        .intro-trigger { 
            position: absolute; bottom: 0; width: 100%; height: 100%; 
            cursor: pointer; z-index: 30;
        }

        /* --- 對話框：貼底長方形、磨砂感 --- */
        #game-screen-content { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: flex-end; 
        }
        #dialogue-ui { 
            width: 100%; 
            height: 240px; 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-top: 2px solid rgba(255, 255, 255, 0.4);
            padding: 35px 8%; 
            box-sizing: border-box;
            z-index: 100;
            cursor: pointer;
        }
        #char-name { 
            background: var(--main-gold); color: white; 
            padding: 5px 25px; font-size: 1.2em; font-weight: bold;
            display: inline-block; margin-bottom: 12px; letter-spacing: 2px;
        }
        #text-content { 
            font-size: 1.55em; line-height: 1.7; color: #111; 
            letter-spacing: 1.5px; font-weight: 800;
        }

        /* 選項 */
        .opt-container { 
            width: 100%; position: absolute; bottom: 260px; left: 0; 
            display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 200; 
        }
        .opt-btn { 
            width: 380px; padding: 18px; background: white; 
            border: 2.5px solid var(--main-gold); cursor: pointer; 
            font-size: 1.2em; font-weight: bold; color: var(--main-gold); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 下雨 */
        #rain-overlay { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 5; display: none; }
        .rain { width: 100%; height: 100%; background-image: linear-gradient(to bottom, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0) 100%); background-size: 2px 400px; animation: rain-fall 0.6s linear infinite; }
        @keyframes rain-fall { 0% { background-position: 0px -400px; } 100% { background-position: 20px 800px; } }
    </style>
</head>
<body>

    <div id="rain-overlay"><div class="rain"></div></div>

    <div id="start-screen" class="screen active" style="background-image: url('0.jpg');" onclick="switchScreen('selector-screen')"></div>

    <div id="selector-screen" class="screen" style="background-image: url('selector_bg.jpg');">
        <div class="char-grid">
            <div class="char-hitbox" onclick="showIntro('zhou')"></div> <div class="char-hitbox"></div> <div class="char-hitbox"></div> <div class="char-hitbox"></div> </div>
    </div>

    <div id="zhou-intro-screen" class="screen" style="background-image: url('zhou_intro.jpg');">
        <div class="intro-trigger" onclick="startStory()"></div>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-screen-content">
            <div id="opt-box" class="opt-container"></div>
            <div id="dialogue-ui" onclick="handleNext()">
                <div id="char-name"></div>
                <div id="text-content"></div>
            </div>
        </div>
    </div>

<script>
    const story = [
        { name: "旁白", text: "晚間，城市淅瀝瀝地下著雨，無情沖刷每一處，雨聲像沒完沒了的碎玻璃，一片片砸在城市的雨夜裡。", bg: "rain_night.jpg", rain: true },
        { name: "旁白", text: "一如往常，你走在那條熟悉的路上，準備回家。", bg: "rain_night.jpg", rain: true },
        { name: "旁白", text: "倏忽，一聲語氣強烈的咒罵穿透了雨幕，落入耳中，隨即是幾記沉悶的碰撞聲。", bg: "rain_night.jpg", rain: true },
        { name: "旁白", text: "巷口昏黃的路燈下，你看見一名身著校服的學生被兩個男生困在牆邊。他那一頭張揚的金髮被雨打濕，貼在額前，校服白襯衫凌亂、沾著灰，唇角破裂滲著紅。", bg: "alley_night.jpg", rain: true },
        { name: "Y/N", text: "「住手，我已經報警了！」", bg: "alley_night.jpg", rain: true },
        { name: "周渺", text: "「......多管閒事。」他低著頭，聲音冷得像冰。", bg: "alley_night.jpg", rain: true },
        { name: "旁白", text: "你不理會他不耐煩的語氣，蹲下與之平視。「嘴角破的蠻深的，手臂的傷口也有點大，你可能需要去醫院。」", bg: "alley_night.jpg", rain: true },
        { name: "周渺", text: "「別碰我。」他縮了一下，眼神充滿防備。", bg: "alley_night.jpg", rain: true },
        { name: "旁白", text: "「受傷了就好好待著別動，我看看傷口嚴不嚴重。」你放軟了語調，堅定地握住他的手腕。", bg: "alley_night.jpg", rain: true },
        { name: "周渺", text: "「奇怪的人......」他看著妳的身影喃喃自語。", bg: "alley_night.jpg", rain: true },
        { name: "旁白", text: "夕陽把操場暈染成柔和的橘金色，光線像被刻意放慢，輕輕鋪在跑道與草地上。空氣瀰漫溫柔和靜謐。", bg: "school_track.jpg", rain: false },
        { name: "旁白", text: "放學後，你到高中找周渺。他偶爾偷看你，耳尖在夕光中微微發紅。", bg: "school_track.jpg" },
        { name: "Y/N", text: "「看看，像不像第一次見面的你，張牙舞爪的，但明明很可愛的嘛。」", bg: "school_track.jpg" },
        { name: "周渺", text: "「怎麼又提起來、別逗我了......姐姐。」他侷促地低頭。", bg: "school_track.jpg" },
        { name: "Y/N", text: "「喊聲姐姐來聽聽囉，我考慮一下要不要放過你。」", bg: "school_track.jpg" },
        { name: "周渺", text: "「姐、姐姐......」他聲音細如蚊蚋。", bg: "school_track.jpg" },
        { name: "旁白", text: "夜幕降臨，街道兩旁的霓虹燈開始閃爍。氣氛突然變得凝重，妳停下腳步，轉頭看向他。", bg: "street_night.jpg", rain: false },
        { name: "Y/N", text: "「我們還是分開吧，我不想把你綁在我身邊，耽誤你的未來。」", bg: "street_night.jpg" },
        { name: "周渺", text: "「姐姐......你不要我了嗎？」他慌張地抓住你的衣角，眼神清澈卻盛滿絕望。", bg: "street_night.jpg" },
        { name: "周渺", text: "「妳總是這樣...輕易地決定我的未來。那妳有沒有想過，我的未來裡如果沒有妳，還算什麼未來？」", bg: "street_night.jpg" },
        { name: "周渺", text: "「我努力考上理想的學校，努力變得成熟，都是為了能站在妳身邊啊！」", bg: "street_night.jpg" },
        { name: "周渺", text: "「Y/N，別再把我當小孩了。這不是一小段路，這是我的人生。」", bg: "street_night.jpg" },
        { name: "周渺", text: "「姐姐，別再推開我了，好嗎？」他緊緊凝視著妳。", bg: "street_night.jpg" },
        { 
            name: "抉擇", 
            text: "地面映照著城市的燈火，看著他眼底的淚光，妳的回答是？", 
            options: [
                { text: "回抱住他", reaction: "他激動地緊緊擁抱妳。", nextIndex: 24 },
                { text: "狠心離開", reaction: "妳沒回頭，消失在霓虹中。", nextIndex: 25 }
            ]
        },
        { name: "周渺", text: "「只要妳不走...要我做什麼都可以。」", bg: "street_night.jpg", end: true },
        { name: "旁白", text: "夜風吹過，故事在此刻翻開了新的一頁。", bg: "street_night.jpg", end: true }
    ];

    let step = 0; let isTyping = false; let typingTimer; let currentLine = null;

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function showIntro(char) { if(char==='zhou') switchScreen('zhou-intro-screen'); }
    function startStory() { step = 0; switchScreen('game-screen'); playNext(); }

    function playNext() {
        if (step >= story.length) return;
        currentLine = story[step];
        document.getElementById('rain-overlay').style.display = currentLine.rain ? 'block' : 'none';
        document.getElementById('char-name').innerText = currentLine.name;
        document.getElementById('opt-box').innerHTML = "";
        if (currentLine.bg) document.getElementById('game-screen').style.backgroundImage = `url('${currentLine.bg}')`;
        if (currentLine.options) { showOptions(currentLine); } else { typeText(currentLine.text); step++; }
    }

    function typeText(text) {
        isTyping = true; let i = 0; const el = document.getElementById('text-content');
        el.innerText = ""; clearInterval(typingTimer);
        typingTimer = setInterval(() => {
            if (i < text.length) { el.innerText += text[i++]; }
            else { isTyping = false; clearInterval(typingTimer); }
        }, 30);
    }

    function showOptions(line) {
        document.getElementById('text-content').innerText = line.text;
        const box = document.getElementById('opt-box');
        line.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt-btn'; b.innerText = opt.text;
            b.onclick = (e) => { e.stopPropagation(); alert(opt.reaction); step = opt.nextIndex; playNext(); };
            box.appendChild(b);
        });
    }

    // 恢復功能：打字中點擊直接顯示全部
    function handleNext() {
        if (currentLine && currentLine.options) return;
        if (isTyping) { 
            clearInterval(typingTimer); 
            document.getElementById('text-content').innerText = currentLine.text; 
            isTyping = false; 
        } else { 
            if (currentLine && currentLine.end) { location.reload(); } 
            else playNext(); 
        }
    }
</script>
</body>
</html>
