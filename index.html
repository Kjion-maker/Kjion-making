<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <style>
        /* --- 基礎設定與自動縮放基準 --- */
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        
        #game-container { position: relative; width: 1280px; height: 720px; background-color: #000; box-shadow: 0 0 30px rgba(0,0,0,0.8); overflow: hidden; transform-origin: center; flex-shrink: 0; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease; }

        /* --- 1. 遊戲封面 --- */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 200; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        #start-screen img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 2. 選角畫面：透明按鈕與發光特效 --- */
        #intro-menu-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 150; display: none; }
        #char-select-img { width: 100%; height: 100%; object-fit: cover; }
        
        .char-select-btn { position: absolute; cursor: pointer; z-index: 160; transition: 0.3s; border-radius: 15px; }
        /* 滑鼠移上去時的微微發光感 */
        .char-select-btn:hover { background-color: rgba(255, 255, 255, 0.15); box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); }
        
        /* 精準對齊四張圖的位子 (百分比定位，縮放絕對不跑位) */
        #btn-char1 { top: 12%; left: 15%; width: 33%; height: 36%; } /* 左上：周渺 */
        #btn-char2 { top: 12%; left: 52%; width: 33%; height: 36%; } /* 右上 */
        #btn-char3 { top: 52%; left: 15%; width: 33%; height: 36%; } /* 左下 */
        #btn-char4 { top: 52%; left: 52%; width: 33%; height: 36%; } /* 右下：江逸 */

        /* 通用覆蓋樣式，用於遮蓋圖片像素 */
        .intro-ui-cover { position: absolute; background-color: #000; /* 使用黑色遮蓋 */ z-index: 155; pointer-events: none; /* 遮蓋層不阻擋點擊圖片 */ }

        /* UI按鈕樣式，對話框內往回步驟需要用 */
        .sys-btn { position: absolute; top: 20px; right: 20px; background-color: rgba(212, 175, 55, 0.7); color: white; border: 1px solid #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; z-index: 170; font-size: 16px; transition: 0.3s; }
        .sys-btn:hover { background-color: rgba(212, 175, 55, 1); }
        #back-btn:disabled { display: none; }

        /* --- 3. 對話系統與打字機效果 --- */
        #dialogue-box { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; height: 180px; background-color: rgba(20, 20, 20, 0.9); border: 2px solid #d4af37; border-radius: 10px; box-sizing: border-box; padding: 40px 30px 20px 30px; color: #fff; cursor: pointer; display: none; z-index: 50; }
        #speaker-name { position: absolute; top: -20px; left: 30px; background-color: #d4af37; color: #fff; padding: 5px 20px; font-size: 22px; font-weight: bold; border-radius: 5px; }
        #dialogue-text { font-size: 22px; line-height: 1.6; font-weight: bold; }

        /* --- 4. 選項與特殊互動 --- */
        #options-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 20px; width: 60%; display: none; z-index: 60; }
        .option-btn { background-color: rgba(255, 255, 255, 0.95); color: #333; border: 2px solid #d4af37; padding: 15px 20px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: center; }
        .option-btn:hover { background-color: #d4af37; color: #fff; }

        #interact-btn { position: absolute; background-color: rgba(255, 255, 255, 0.9); border: 2px dashed #a67c52; padding: 15px 40px; font-size: 24px; font-weight: bold; color: #5c3a21; cursor: pointer; border-radius: 10px; display: none; z-index: 70; animation: pulse 1.5s infinite; transform: translate(-50%, -50%); }
        #paper-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 80; }
        #paper-content { background-color: #fdf5e6; width: 500px; height: 300px; padding: 40px; border-radius: 5px; font-size: 30px; color: #333; display: flex; justify-content: center; align-items: center; text-align: center; transform: rotate(-2deg); cursor: pointer; position: relative; box-shadow: 10px 10px 20px rgba(0,0,0,0.5); }
        
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.05); } }
    </style>
</head>

<script>
    // --- 劇本資料庫 1：周渺路線 ---
    const zhouScript = [
        { bg: "streetnight", speaker: "旁白", text: "晚間，城市淅瀝瀝地下著雨，無情沖刷每一處，雨聲像沒完沒了的碎玻璃，一片片砸在城市的雨夜裡。", rain: true },
        { bg: "streetnight", speaker: "旁白", text: "一如往常，你走在那條熟悉的路上，準備回家。", rain: true },
        { bg: "streetnight", speaker: "旁白", text: "倏忽，一聲語氣強烈的咒罵穿透了雨幕，隨即是幾記沉悶的碰撞聲，像拳頭砸在肉上，伴隨微弱幾不可察的悶哼。", rain: true },
        { bg: "streetnight", speaker: "旁白", text: "巷口昏黃的路燈下，你看見一名身著校服的學生被兩個男生困在牆邊。他一頭張揚的金髮被雨打濕，校服襯衫沾著灰，唇角滲著紅。", rain: true },
        { bg: "boy.jpg", speaker: "旁白", text: "他呼吸急促，肩膀隨著疼痛微顫，但眼神依舊冷得像能把人隔絕在外。就在其中一人抬手要再揍下去時——", rain: true },
        { bg: "streetnight", speaker: "Y/N", text: "「住手，我已經報警了！」", rain: true },
        { bg: "bad", speaker: "旁白", text: "雨勢漸大。幾聲咒罵混雜在雨聲裡，那兩人踩著濺起的水花，迅速消失在深沉的雨夜盡頭。", rain: true },
        { bg: "angry.jpg", speaker: "周渺", text: "「......多管閒事。」", rain: true },
        { 
            bg: "close.street", speaker: "抉擇", text: "看著倒在牆邊的他，你的回應是？", 
            options: [
                { text: "就當我是在做善事", nextLine: 9 },
                { text: "⋯⋯", nextLine: 10 }
            ],
            rain: true
        },
        // 分支 1 (Index 9)
        { bg: "close.street", speaker: "Y/N", text: "「就當作我是在做善事、行善積德囉。」你不理會他的排斥，蹲下與之平視，檢查他的傷勢。", rain: true, jumpTo: 11 },
        // 分支 2 (Index 10)
        { bg: "close.street", speaker: "Y/N", text: "「⋯⋯嘴角破的蠻深的，手臂的傷口也有點大，你可能需要去醫院。」你蹲下與之平視，檢查他的傷勢。", rain: true },
        
        { bg: "angryboy.jpg", speaker: "周渺", text: "「別碰我。」他語氣強硬，動作也抗拒著，眼神仍帶著防備。", rain: true },
        { bg: "hand.jpg", speaker: "Y/N", text: "「受傷了就好好待著別動，我看看傷口嚴不嚴重。」你放軟了語調，但堅定地握住他的手腕。", rain: true },
        { bg: "umback", speaker: "Y/N", text: "「以後小心點，記得去醫院看看。」你簡單包紮後，留下了一把備用傘，轉身離去。", rain: true },
        { bg: "plainface", speaker: "周渺", text: "「奇怪的人......」他看著你的背影喃喃自語。", rain: true },
        
        // 場景切換：操場 (Index 15)
        { bg: "run.jpg", speaker: "旁白", text: "夕陽把操場暈染成柔和的橘金色。放學後，你到周渺就讀的高中找他。空氣瀰漫著溫柔和靜謐。", rain: false },
        { bg: "run.jpg", speaker: "旁白", text: "你們並肩走在安靜的操場。他偶爾偷看你，又迅速移開視線，耳尖在夕光中微微發紅。" },
        { bg: "cat", speaker: "旁白", text: "突然，一聲貓叫聲劃破了寧靜——（喵～）", sound: "cat.mp3" },
        { bg: "cat", speaker: "Y/N", text: "「哇，好可愛的貓咪......」你伸出手，雖然被牠的叫聲嚇了一跳，但仍柔聲安撫牠。" },
        { bg: "mimi", speaker: "旁白", text: "小貓感受到你的善意，乖順地蹭了蹭你的掌心。你指腹順著牠柔軟的背毛慢慢滑過。" },
        { bg: "run.jpg", speaker: "Y/N", text: "「看看，像不像第一次見面的你，張牙舞爪的，但明明很可愛的嘛。」你彎起嘴角輕笑。" },

        { bg: "shyboy.jpg", speaker: "周渺", text: "「姐、姐姐......」他害羞地低下了頭。" },
        
        // 劇情三：分離 (Index 24)
        { bg: "car.jpg", speaker: "Y/N", text: "「我們還是分開吧，我不想把你綁在我身邊，耽誤你的未來。」" },
        { bg: "carboy.jpg", speaker: "周渺", text: "「姐姐......你不要我了嗎？」" },
        { bg: "car.jpg", speaker: "Y/N", text: "「你還小，未來會遇到更多不同的人......分開對我們來說都好。」你語氣冷硬。" },
        { bg: "carboy.jpg", speaker: "周渺", text: "「Y/N，別再把我當小孩了！」他打斷你，眼神中滿是掙扎。" },
        { bg: "carboy.jpg", speaker: "周渺", text: "「姐姐、姐姐，不要丟下我⋯⋯」他慌張又無措地想伸手抓住你，試圖挽留。" },
        { 
            bg: "car.jpg", speaker: "抉擇", text: "看著他眼眶中的淚水，你是否願意接受他的挽留？", 
            options: [
                { text: "接受挽留，回抱他", nextLine: 30 },
                { text: "轉身離去，不再回頭", nextLine: 32 }
            ]
        },
        { bg: "car.jpg", speaker: "旁白", text: "你終究還是心軟了，伸手回抱住這個顫抖的少年。他的世界在那一刻重新亮了起來。", action: "endGame" },
        { bg: "car.jpg", speaker: "旁白", text: "你推開了他的手，頭也不回地走入雨幕。這段關係終究劃下了句點。", action: "endGame" }
    ];

    // --- 完整劇本：江逸 (雙重心理戰終極版) ---
    const jiangScript = [
        // 【第一幕：初次相遇】
        { bg: "JiangYi/Street-1.png", speaker: "女主角 (OS)", text: "好累……經歷了一個早上的課程，好想找個地方趴一下……<br>嗯？好濃郁的咖啡烘焙香氣……" },
        { bg: "JiangYi/Wind chimes.png", speaker: "", text: "（妳順著香味，推開了街角一間咖啡廳的門。）<br>— 清脆的風鈴聲響起 —" },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "你好～歡迎光臨，請問今天想喝點什麼？" },
        { bg: "JiangYi/Start Counter.png", speaker: "", text: "", action: "showMenuInteract", hideDialogue: true },
        { bg: "JiangYi/Menu.png", speaker: "女主角 (OS)", text: "（看看菜單上有什麼吧……）", 
          options: [
              { text: "我第一次來，請問有推薦的嗎？", nextLine: 5 },
              { text: "我想要一杯熱美式就好……", nextLine: 6 }
          ] 
        },
        { bg: "JiangYi/Making Coffee.png", speaker: "江逸", text: "看妳好像有點累。如果怕太苦，可以考慮「熱的燕麥奶拿鐵」。燕麥奶拿鐵適合想稍微打起精神的時候。", nextLine: 7 },
        { bg: "JiangYi/Making Coffee.png", speaker: "江逸", text: "好的，一杯熱美式。", nextLine: 7 },
        { bg: "JiangYi/Start Counter.png", speaker: "女主角", text: "好～謝謝你！" },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "有想坐在哪裡嗎？如果不介意，可以考慮靠窗的那個座位。" },
        { bg: "JiangYi/Love Seat.png", speaker: "女主角", text: "好啊，謝謝你！" },
        { bg: "JiangYi/Seat Window.png", speaker: "女主角 (OS)", text: "（坐在窗邊，感覺這份寧靜正一點一滴地治癒著疲憊……）" },
        { bg: "JiangYi/Tray.png", speaker: "女主角", text: "好香的味道～<br>（托盤上的咖啡旁，似乎壓著一張折起來的紙條）", action: "showPaperInteract" },
        { bg: "JiangYi/Tray.png", speaker: "旁白", text: "看完紙條的那刻，心頭暖暖的，露出了滿足的微笑。" },

        // 【第二幕：期中考與雙重試探】
        // 過場黑畫面
        { bg: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+A8AAQUBAScY42YAAAAASUVORK5CYII=", speaker: "", text: "（幾天後，期中考週的地獄正式降臨……）" },
        { bg: "JiangYi/Wind chimes.png", speaker: "女主角 (OS)", text: "（剛經歷了一場毀滅性的期中考，我現在只想找個安靜的地方躲起來。）" },
        { bg: "JiangYi/Start Counter.png", speaker: "女主角", text: "江逸……我想要一杯熱美式。" },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "（看著我糟糕的臉色，他沉默了一下）<br>……今天沒有美式。這杯是熱可可。去坐著吧。" },
        { bg: "JiangYi/Love Seat.png", speaker: "女主角 (OS)", text: "（他沒有多問，只是給了一杯不在菜單上的熱可可。緊繃的情緒放鬆下來，眼皮越來越重……）" },
        
        // 過場黑畫面 (睡著)

        },

        // 💔 第二道考驗：Bad End 路線 (Index 32-35)
        { bg: "JiangYi/Start Counter.png", speaker: "女主角", text: "江逸，其實你一直都在默默關心我對不對？關音樂、蓋毛毯……<slow>你明明有一顆很柔軟的心，為什麼總要裝得這麼冷漠？</slow>", nextLine: 33 },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "（臉上的血色瞬間褪去，眼神肉眼可見地冷卻下來）<br>……<slow>請妳不要過度解讀。</slow>", nextLine: 34 },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "店裡冷氣強，我只是不想有客人生病，處理起來很麻煩。熱可可只是剛好有快過期的粉。別把妳的幻想投射在我身上。", nextLine: 35 },
        { bg: "JiangYi/Start Counter.png", speaker: "女主角 (OS)", text: "（我試圖扒開他的防衛，卻觸發了他最深層的恐懼。他用最傷人的話，徹底斬斷了我們之間的可能。）<br><span style='color:#ff5555'>—— Bad End：自以為是的看透 ——</span>", action: "endGame" },

        // 💖 第二道考驗：True End 路線 (Index 36-40)
        { bg: "JiangYi/Start Counter.png", speaker: "女主角", text: "謝謝老闆的『靜音模式』和專屬毛毯！那杯熱可可超有效，睡一覺起來，我現在已經滿血復活了！", nextLine: 37 },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "（原本緊繃的身體，在聽到這句輕鬆的玩笑後，明顯地放鬆了下來）<br>……滿血復活就好。看來那杯熱可可的成本沒有白花。", nextLine: 38 },
        { bg: "JiangYi/Start Counter.png", speaker: "女主角", text: "絕對超值！為了報答老闆的恩情，我決定……明天來消費一杯最貴的咖啡！", nextLine: 39 },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "（嘴角終於忍不住勾起一抹極度放鬆的輕笑）<br>最貴的？那我要考慮臨時漲價了。……明天見。妳點什麼，位子都幫妳留著。", nextLine: 40 },
        { bg: "JiangYi/Start Counter.png", speaker: "女主角 (OS)", text: "（我不去觸碰他的傷口，只是接住了他的好。看著他放鬆的笑容，我知道，我拿到了通往他心裡的鑰匙。）<br><span style='color:#ffd700'>—— True End：不言而喻的默契 ——</span>", action: "endGame" }
    ];

    // --- 核心變數 ---
    let activeScript = []; let historyStack = []; let currentIndex = 0;
    let isTyping = false; let currentFullText = ""; let typingTimer;

    // --- 導航功能 ---
    function goToMenu() { document.getElementById("start-screen").style.display = "none"; document.getElementById("intro-menu-screen").style.display = "block"; }
    function backToStart() { document.getElementById("intro-menu-screen").style.display = "none"; document.getElementById("start-screen").style.display = "flex"; } // 這個功能已用遮蓋替代

    function startStory(char) {
        activeScript = (char === 'zhou') ? zhouScript : jiangScript;
        document.getElementById("intro-menu-screen").style.display = "none";
        currentIndex = 0; historyStack = ["intro"];
        renderLine(0);
    }

    function renderLine(index) {
        const line = activeScript[index];
        document.getElementById("bg-image").src = line.bg;
        
        const nameBox = document.getElementById("speaker-name");
        nameBox.innerText = line.speaker || "";
        nameBox.style.display = line.speaker ? "block" : "none";

        const dialogueBox = document.getElementById("dialogue-box");
        dialogueBox.style.display = line.hideDialogue ? "none" : "block";
        
        startTypewriter(line.text || "");

        // 重置 UI
        document.getElementById("options-container").style.display = "none";
        document.getElementById("interact-btn").style.display = "none";
        document.getElementById("back-btn").style.display = (historyStack.length <= 1) ? "none" : "block"; // 往回一步功能
        
        // 特殊行動
        if (line.options) {
            const optContainer = document.getElementById("options-container");
            optContainer.innerHTML = "";
            line.options.forEach(opt => {
                const btn = document.createElement("div");
                btn.className = "option-btn"; btn.innerText = opt.text;
                btn.onclick = (e) => { e.stopPropagation(); historyStack.push(currentIndex); currentIndex = opt.nextLine; renderLine(currentIndex); };
                optContainer.appendChild(btn);
            });
            setTimeout(() => { if(!isTyping) optContainer.style.display = "flex"; }, 500);
        }

        if (line.action === "showMenuInteract" || line.action === "showPaperInteract") {
            const btn = document.getElementById("interact-btn");
            btn.style.display = "block";
            btn.innerText = (line.action === "showMenuInteract") ? "點擊菜單" : "查看紙條";
            btn.style.left = (line.action === "showMenuInteract") ? "58%" : "50%";
            btn.style.top = (line.action === "showMenuInteract") ? "85%" : "50%";
            btn.onclick = (e) => { e.stopPropagation(); if (line.action === "showMenuInteract") nextLine(); else openPaper(); };
        }

        dialogueBox.onclick = handleBoxClick;
    }

    // --- 打字機與對話框系統 ---
    function startTypewriter(text) {
        isTyping = true; currentFullText = text;
        const target = document.getElementById("dialogue-text");
        target.innerHTML = "";
        let i = 0;
        clearInterval(typingTimer);
        
        typingTimer = setInterval(() => {
            if (i < text.length) {
                if (text[i] === '<') { // 處理 <br> 等標籤
                    let tag = "";
                    while (text[i] !== '>' && i < text.length) { tag += text[i]; i++; }
                    tag += '>'; i++; target.innerHTML += tag;
                } else { target.innerHTML += text[i]; i++; }
            } else { stopTyping(); }
        }, 30);
    }

    function stopTyping() {
        clearInterval(typingTimer);
        document.getElementById("dialogue-text").innerHTML = currentFullText;
        isTyping = false;
        // 如果有選項，在打字結束後顯示
        if (activeScript[currentIndex].options) {
            document.getElementById("options-container").style.display = "flex";
        }
    }

    function handleBoxClick() {
        if (isTyping) { stopTyping(); } 
        else {
            if (activeScript[currentIndex].action === "endGame") { location.reload(); }
            else if (!activeScript[currentIndex].options && !activeScript[currentIndex].action) { nextLine(); }
        }
    }

    // --- 進入下一句 (修復分歧路線跳轉功能) ---
    function nextLine() { 
        historyStack.push(currentIndex); 
        
        const currentLine = activeScript[currentIndex];
        // 檢查是否有指定跳轉到哪一句 (支援 nextLine 或 jumpTo)
        if (currentLine.nextLine !== undefined) {
            currentIndex = currentLine.nextLine;
        } else if (currentLine.jumpTo !== undefined) {
            currentIndex = currentLine.jumpTo;
        } else {
            currentIndex++; // 沒指定就正常 +1
        }
        
        renderLine(currentIndex); 
    }
    function prevLine() { // 往回一步功能
        let prev = historyStack.pop();
        if (prev === "intro") { backToStart(); goToMenu(); } 
        else { currentIndex = prev; renderLine(currentIndex); }
    }

    function openPaper() { document.getElementById("paper-modal").style.display = "flex"; }
    function closePaper() { document.getElementById("paper-modal").style.display = "none"; nextLine(); }

    // --- 精確座標選角 (基於圖片 X 與 Y 範圍判斷) ---
    function checkCharSelect(e) {
        // 使用 offsetX/offsetY 可以直接抓取相對於圖片像素的座標，無視外部 CSS 縮放
        const x = e.offsetX / e.target.clientWidth * 1280;
        const y = e.offsetY / e.target.clientHeight * 720;

        // X: 從左到右 X 像素座標從 0 到 1280
        // Y: 從上到下 Y 像素座標從 0 到 720

        // 獨立判定四個區域 (基於 1280x720 核心比例)
        
        // 1. 周渺 (左上角)
        if (x >= 20 && x <= 610 && y >= 20 && y <= 330) { 
            startStory('zhou'); // 左上：周渺
        } 
        // 2. alert (右上角)
        else if (x >= 670 && x <= 1260 && y >= 20 && y <= 330) { 
            alert('此路線尚未開放'); // 右上：Alert
        } 
        // 3. alert (左下角)
        else if (x >= 20 && x <= 610 && y >= 390 && y <= 700) { 
            alert('此路線尚未開放'); // 左下：Alert
        } 
        // 4. 江逸 (右下角)
        else if (x >= 670 && x <= 1260 && y >= 390 && y <= 700) { 
            startStory('jiang'); // 右下：江逸
        }
        // 如果點擊在角色間的空隙或背景，則不做任何事
    }

    // --- 全螢幕縮放系統 ---
    function autoScale() {
        const container = document.getElementById('game-container');
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        // 計算縮放比例（取寬與高中較小的那個倍數，確保不超出畫面）
        const scale = Math.min(windowWidth / 1280, windowHeight / 720);
        
        container.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', autoScale);
    window.addEventListener('DOMContentLoaded', autoScale);
</script>
